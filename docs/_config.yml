title: SQLTriage
description: The open SQL Server audit and compliance assessment tool — 600+ checks mapped to NIST, CIS, STIG, ISO 27001. The auditable alternative to Microsoft SQL Vulnerability Assessment.
url: https://sqladrian.github.io
baseurl: /SQLTriage

# Bare-bones theme — we own the styling for the audit-first reposition
theme: null

# Sass settings (allows dual-mode CSS if needed later)
sass:
  style: compressed

# Jekyll plugins kept minimal
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# SEO defaults
author: Adrian Sullivan
twitter:
  card: summary_large_image
social:
  name: SQLTriage
  links:
    - https://github.com/SQLAdrian/SQLTriage

# Markdown
markdown: kramdown
kramdown:
  syntax_highlighter: rouge

# Exclude from build
exclude:
  - llm1_deepseek_recovery.md
  - self-learning-compression.md
  - README.md
