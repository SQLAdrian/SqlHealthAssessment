name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: sql-version
    attributes:
      label: SQL Server Version
      options:
        - SQL Server 2016
        - SQL Server 2017
        - SQL Server 2019
        - SQL Server 2022
        - Azure SQL Database
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log Output
      description: From logs/app-*.log
      render: shell
